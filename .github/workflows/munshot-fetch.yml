name: munshot-fetch

on:
  workflow_dispatch

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch MUNS agent output
        run: |
          curl -i -X POST https://devde.muns.io/agents/run \
            -H "Authorization: Bearer ${{ secrets.MUNS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "agent_library_id": "80e60362-47d9-4077-95ac-41b1a609c0cc",
              "metadata": {
                "stock_ticker": "JIOFIN",
                "stock_company_name": "Jio Financial Services Ltd.",
                "context_company_name": "Jio Financial Services Ltd.",
                "stock_country": "INDIA",
                "to_date": "2026-05-01",
                "timezone": "UTC"
              }
            }' > munshot-outputs/agent-80e60362-47d9-4077-95ac-41b1a609c0cc.txt

      - name: Commit and push
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add munshot-outputs/
          git commit -m "munshot: capture sample"
          git push
